# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: defuddle
license:
  name: MIT License
  link: https://github.com/kepano/defuddle/blob/main/LICENSE
version: "0.18.1"
check: ${binary} --version
build_dependencies:
- node-lts
- npm
