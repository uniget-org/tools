# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: htop
description: Interactive process viewer
license:
  name: GNU GPL v2.0
  link: https://github.com/htop-dev/htop/blob/main/COPYING
homepage: https://github.com/htop-dev/htop
repository: https://github.com/htop-dev/htop
version: "3.5.2"
tags:
- category/operations
- lang/c
- type/cli
- terminal
- component/memory
- component/cpu
- load
check: ${binary} --version | cut -d' ' -f2 | cut -d- -f1
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: github-releases
  package: htop-dev/htop
  extractVersion: ^v?(?<version>.+)$
