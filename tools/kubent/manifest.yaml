# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: kubent
description: Easily check your clusters for use of deprecated APIs
license:
  name: MIT License
  link: https://github.com/doitintl/kube-no-trouble/blob/master/LICENSE
homepage: https://github.com/doitintl/kube-no-trouble
repository: https://github.com/doitintl/kube-no-trouble
version: "0.7.3"
tags:
- type/cli
- kubernetes
- management
- cicd
- lang/go
- k8s
- state/stale
check: ${binary} --version 2>&1 | cut -d' ' -f4
platforms:
- linux/amd64
renovate:
  datasource: github-releases
  package: doitintl/kube-no-trouble
