# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: bunster
description: Compile shell scripts to static binaries
license:
  name: BSD-3-Clause License
  link: https://github.com/yassinebenaid/bunster/blob/master/LICENSE
homepage: https://bunster.netlify.app/
repository: https://github.com/yassinebenaid/bunster
version: "0.14.0"
tags:
- category/development
- lang/go
- type/cli
check: "" # No version parameter
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: github-releases
  package: yassinebenaid/bunster
  extractVersion: ^v(?<version>.+)$
