# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: ksort
description: Sort manfest files in a proper order by Kind
license:
  name: Custom
  link: https://github.com/superbrothers/ksort/blob/master/LICENSE.txt
homepage: https://github.com/superbrothers/ksort
repository: https://github.com/superbrothers/ksort
version: "0.4.4"
tags:
- category/operations
- lang/go
- type/cli
- state/onemanshow
- kubernetes
- k8s
- state/stale
check: "" # Version field empty
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: github-releases
  package: superbrothers/ksort
  extractVersion: ^v(?<version>.+)$
