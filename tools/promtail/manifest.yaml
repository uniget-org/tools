# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: promtail
description: Agent which ships the contents of local logs to Grafana Loki
license:
  name: AGPLv3
  link: https://github.com/grafana/loki/blob/main/LICENSE
homepage: https://grafana.com/loki
repository: https://github.com/grafana/loki
version: "3.6.8"
tags:
- org/grafana
- observability/logs
- o11y
- category/monitoring
- lang/go
- type/daemon
- type/cli
- observability/metrics
check: "" # Empty version
platforms:
- linux/amd64
messages:
  usage: |
    Promtail has been deprecated in favor of Grafana Alloy.
lifecycle:
  removed_with_reason: Deprecated. Consider using OpenTelemetry Collector or Grafana Alloy.
