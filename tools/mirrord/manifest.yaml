# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: mirrord
description: Connect your local process and your cloud environment, and run local code in cloud conditions
license:
  name: MIT License
  link: https://github.com/metalbear-co/mirrord/blob/main/LICENSE
homepage: https://mirrord.dev/
repository: https://github.com/metalbear-co/mirrord
version: "3.209.2"
tags:
- category/development
- lang/rust
- type/cli
check: ${binary} --version |cut -d' ' -f2
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: github-releases
  package: metalbear-co/mirrord
