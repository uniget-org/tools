# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: viking
description: Simple way to manage your remote machines and SSH keys
license:
  name: MIT License
  link: https://github.com/d3witt/viking/blob/main/LICENSE
homepage: https://github.com/d3witt/viking
repository: https://github.com/d3witt/viking
version: "0.2.1"
tags:
- category/operations
- lang/go
- type/cli
- state/onemanshow
- state/stale
check: ${binary} --version | cut -d' ' -f3
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: github-releases
  package: d3witt/viking
  extractVersion: ^v(?<version>.+)$
