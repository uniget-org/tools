# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: nodejs-lts
description: Node.js JavaScript runtime
license:
  name: MIT License
  link: https://github.com/nodejs/node/blob/main/LICENSE
homepage: https://github.com/nodejs/node
repository: https://github.com/nodejs/node
version: "24.15.0"
tags:
- type/cli
- category/development
- lang/javascript
check: ${binary} --version | tr -d v
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: gitlab-releases
  package: uniget-org/renovate-custom
  extractVersion: ^nodejs-lts/(?<version>.+)$
binary: node
messages:
  usage: |
    Replaced by "node-lts"
lifecycle:
  renamed_to: node-lts
