# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: wksctl
description: Open Source Weaveworks Kubernetes System
license:
  name: Apache License 2.0
  link: https://github.com/weaveworks/wksctl/blob/master/LICENSE
homepage: https://github.com/weaveworks/wksctl
repository: https://github.com/weaveworks/wksctl
version: "0.10.1"
tags:
- type/cli
- kubernetes
- k8s
- management
- lang/go
- state/stale
- state/deprecated
check: ${binary} version
platforms:
- linux/amd64
renovate:
  datasource: github-releases
  package: weaveworks/wksctl
  extractVersion: ^v(?<version>.+)$
