# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: curl
version: "8.20.0"
check: ${binary} --version | grep ^curl | cut -d' ' -f2
platforms:
- linux/amd64
- linux/arm64
tags:
- org/curl
- type/cli
- component/network
- lang/c
homepage: https://curl.se/
repository: https://github.com/curl/curl
description: Tool and library for transferring data with URL syntax
renovate:
  datasource: gitlab-releases
  package: uniget-org/renovate-custom
  extractVersion: ^curl/(?<version>.+)$
license:
  name: curl
  link: https://curl.se/docs/copyright.html
