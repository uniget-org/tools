# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: car
description: Like tar, but for containers
license:
  name: Apache License 2.0
  link: https://github.com/tetratelabs/car/blob/master/LICENSE
homepage: https://github.com/tetratelabs/car
repository: https://github.com/tetratelabs/car
version: "1.0.1"
tags:
- category/development
- lang/go
- type/cli
- container/image
- state/stale
check: "" # No version parameter
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: github-releases
  package: tetratelabs/car
  extractVersion: ^v(?<version>.+)$
