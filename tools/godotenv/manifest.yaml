# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: godotenv
description: Go port of Ruby's dotenv library (Loads environment variables from `.env`.)
license:
  name: MIT License
homepage: http://godoc.org/github.com/joho/godotenv
repository: https://github.com/joho/godotenv
version: "1.5.1"
tags:
- category/development
- type/cli
- lang/go
check: "" # No version parameter
platforms:
- linux/amd64
renovate:
  datasource: github-releases
  package: joho/godotenv
  extractVersion: ^v(?<version>.+)$
