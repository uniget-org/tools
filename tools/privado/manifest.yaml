# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: privado
description: Open Source Static Scanning tool to detect data flows in your code and find data security vulnerabilities
license:
  name: GNU Lesser General Public License v3.0
  link: https://github.com/Privado-Inc/privado/blob/main/LICENSE
homepage: https://docs.privado.ai
repository: https://github.com/Privado-Inc/privado
version: "1.3.91"
tags:
- category/security
- type/cli
- lang/python
- static-analysis
- privacy
- compliance
check: ${binary} --version
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: github-releases
  package: Privado-Inc/privado
  extractVersion: ^v(?<version>.+)$
