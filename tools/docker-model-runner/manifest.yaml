# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: docker-model-runner
description: Docker Model Runner
#renovate:
#  datasource: github-releases
#  package: docker/model-runner
#  extractVersion: ^v(?<version>.+)$
#  priority: low
license:
  name: Apache License 2.0
  link: https://github.com/docker/model-runner/blob/main/LICENSE
homepage: https://github.com/docker/model-runner
repository: https://github.com/docker/model-runner
version: "1.2.5"
tags:
- org/docker
- category/development
- lang/go
- type/daemon
- ai
check: ${binary} version 2>&1 | grep ^Client -A 1 | tail -n 1 | tr -d ' ' | cut -d':' -f2 | tr -d v
build_dependencies:
- go
- make
platforms:
- linux/amd64
binary: model-runner
renovate:
  datasource: github-releases
  package: docker/model-runner
  extractVersion: ^v(?<version>.+)$
