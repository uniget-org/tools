# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: hopp
description: CLI to run Hoppscotch Test Scripts in CI environments
license:
  name: MIT License
  link: https://github.com/hoppscotch/hoppscotch/blob/main/LICENSE
homepage: https://hoppscotch.io/
repository: https://github.com/hoppscotch/hoppscotch
version: "0.30.3"
tags:
- org/hoppscotch
- category/development
- lang/javascript
- type/cli
check: ${binary} --ver
build_dependencies:
- node-lts
- python-3.12
runtime_dependencies:
- node-lts
platforms:
- linux/amd64
#- linux/arm64
renovate:
  datasource: npm
  package: "@hoppscotch/cli"
