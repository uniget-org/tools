# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: difft
description: Structural diff that understands syntax (difftastic)
license:
  name: MIT License
  link: https://github.com/Wilfred/difftastic/blob/master/LICENSE
homepage: https://github.com/Wilfred/difftastic
repository: https://github.com/Wilfred/difftastic
version: "0.69.0"
tags:
- category/development
- lang/rust
- type/cli
check: ${binary} --version | grep ^Difftastic | cut -d' ' -f2
build_dependencies:
- rust
platforms:
- linux/amd64
renovate:
  datasource: github-releases
  package: Wilfred/difftastic
