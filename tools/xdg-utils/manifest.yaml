# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: xdg-utils
version: "1.2.1"
binary: xdg-open
check: ${binary} --version | cut -d' ' -f2
build_dependencies:
- make
tags:
- wsl
- lang/shell
- state/stale
- type/cli
- category/terminal
homepage: https://www.freedesktop.org/wiki/Software/xdg-utils/
repository: https://www.freedesktop.org/wiki/Software/xdg-utils/
description: Desktop integration utilities
renovate:
  datasource: git-tags
  package: https://gitlab.freedesktop.org/xdg/xdg-utils.git
  extractVersion: ^v(?<version>\d+\.\d+(\.\d+)?)$
license:
  name: MIT License
  link: https://gitlab.freedesktop.org/xdg/xdg-utils/-/blob/master/LICENSE?ref_type=heads
platforms:
- linux/amd64
