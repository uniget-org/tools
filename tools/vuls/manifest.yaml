# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: vuls
description: Agent-less vulnerability scanner for Linux, FreeBSD, Windows and macOS
license:
  name: MIT License
  link: https://github.com/future-architect/vuls/blob/master/LICENSE
homepage: https://vuls.io
repository: https://github.com/future-architect/vuls
version: "0.39.3"
tags:
- category/security
- lang/go
- type/cli
check: ${binary} -v | cut -d- -f2
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: github-releases
  package: future-architect/vuls
  extractVersion: ^v(?<version>.+)$
