# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: fga
description: A cross-platform CLI to interact with an OpenFGA server
license:
  name: Apache License 2.0
  link: https://github.com/openfga/cli/blob/main/LICENSE
homepage: https://openfga.dev
repository: https://github.com/openfga/cli
version: "0.7.19"
tags:
- type/cli
- category/security
- lang/go
- authorization
- iam
- fga
check: ${binary} version 2>/dev/null | grep -oP '\d+\.\d+\.\d+'
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: github-releases
  package: openfga/cli
  extractVersion: ^v(?<version>.+)$
