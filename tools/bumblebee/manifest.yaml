# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: bumblebee
description: Get eBPF programs running from the cloud to the kernel
license:
  name: Apache License 2.0
  link: https://github.com/solo-io/bumblebee/blob/main/LICENSE
homepage: https://github.com/solo-io/bumblebee
repository: https://github.com/solo-io/bumblebee
version: "0.0.15"
tags:
- type/cli
- ebpf
- lang/c
- state/stale
check: ${binary} version
platforms:
- linux/amd64
renovate:
  datasource: github-releases
  package: solo-io/bumblebee
  extractVersion: ^v(?<version>.+)$
binary: bee
