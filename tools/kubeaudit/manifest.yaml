# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: kubeaudit
description: Audit your Kubernetes clusters against common security controls
license:
  name: MIT License
  link: https://github.com/Shopify/kubeaudit/blob/main/LICENSE
homepage: https://github.com/Shopify/kubeaudit
repository: https://github.com/Shopify/kubeaudit
version: "0.22.2"
tags:
