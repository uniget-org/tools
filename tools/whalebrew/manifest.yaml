# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: whalebrew
description: Homebrew, but with Docker images
license:
  name: Apache License 2.0
  link: https://github.com/whalebrew/whalebrew/blob/master/LICENSE
homepage: https://github.com/whalebrew/whalebrew
repository: https://github.com/whalebrew/whalebrew
version: "0.5.0"
tags:
- type/cli
- package
- management
- lang/go
- standard/oci
- state/stale
check: ${binary} version | cut -d' ' -f2
platforms:
- linux/amd64
renovate:
  datasource: github-releases
  package: whalebrew/whalebrew
