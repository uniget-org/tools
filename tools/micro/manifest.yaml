# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: micro
description: API first development platform
license:
  name: Apache License 2.0
  link: https://github.com/micro/micro/blob/master/LICENSE
homepage: https://micro.dev
repository: https://github.com/micro/go-micro
version: "5.20.0"
tags:
- category/development
- lang/go
- type/cli
check: ${binary} --version 2>/dev/null | cut -d' ' -f3
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: github-releases
  package: micro/go-micro
  extractVersion: ^v(?<version>.+)$
