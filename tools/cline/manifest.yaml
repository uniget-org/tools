check: ${binary} --version
build_dependencies:
- npm
runtime_dependencies:
- node-lts
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: github-releases
  package: cline/cline
  extractVersion: ^cli-v(?<version>.+)$