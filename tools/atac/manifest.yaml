# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: atac
description: A simple API client (Postman-like) in your terminal. A TUI HTTP client for testing APIs
license:
  name: MIT License
  link: https://github.com/Julien-cpsn/ATAC/blob/main/LICENSE
homepage: https://atac.julien-cpsn.com
repository: https://github.com/Julien-cpsn/ATAC
version: "0.23.0"
tags:
- category/development
- lang/rust
- type/cli
- api
- http
- tui
- terminal
- testing
check: ${binary} --version | cut -d' ' -f2
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: github-releases
  package: Julien-cpsn/ATAC
  extractVersion: ^v(?<version>.+)$
