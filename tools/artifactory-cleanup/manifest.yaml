# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: artifactory-cleanup
description: Cleanup artifacts on Jfrog Artifactory with advanced settings
license:
  name: MIT License
  link: https://github.com/crazy-max/artifactory-cleanup/blob/master/LICENSE
homepage: https://crazymax.dev/artifactory-cleanup/
repository: https://github.com/crazy-max/artifactory-cleanup
version: "1.7.0"
tags:
- type/cli
- management
- storage
- lang/go
- state/deprecated
- state/stale
check: ${binary} --version
platforms:
- linux/amd64
renovate:
  datasource: github-releases
  package: crazy-max/artifactory-cleanup
  extractVersion: ^v(?<version>.+)$
