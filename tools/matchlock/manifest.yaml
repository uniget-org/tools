# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: matchlock
license:
  name: MIT License
  link: https://github.com/jingkaihe/matchlock/blob/main/LICENSE
version: "0.2.10"
check: ${binary} --version | cut -d' ' -f3
platforms:
- linux/amd64
- linux/arm64
tags:
- category/security
- lang/rust
- type/cli
- sandbox
homepage: https://github.com/jingkaihe/matchlock
repository: https://github.com/jingkaihe/matchlock
description: Matchlock secures AI agent workloads with a Linux-based sandbox
renovate:
  datasource: github-releases
  package: jingkaihe/matchlock
  extractVersion: ^v(?<version>.+)$
