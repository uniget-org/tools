# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: lnav
description: Logfile Navigator - advanced terminal log file viewer
license:
  name: BSD-2-Clause
  link: https://github.com/tstack/lnav/blob/master/LICENSE
homepage: https://lnav.org
repository: https://github.com/tstack/lnav
version: "0.13.0"
tags:
- type/cli
- category/operations
- lang/cpp
- logs
- terminal
- viewer
check: ${binary} -V | cut -d' ' -f2
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: github-releases
  package: tstack/lnav
  extractVersion: ^v?(?<version>.+)$
