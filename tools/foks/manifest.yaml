# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: go-foks
description: End-to-end encrypted key-value and secret store integrated with Git and SSH
license:
  name: MIT License
  link: https://github.com/foks-proj/go-foks/blob/main/LICENSE
homepage: https://foks.pub
repository: https://github.com/foks-proj/go-foks
version: "0.1.8"
