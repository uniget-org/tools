# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: cyclonedx-cli
description: CycloneDX CLI tool for SBOM analysis, merging, diffs and format conversions
license:
  name: Apache License 2.0
  link: https://github.com/CycloneDX/cyclonedx-cli/blob/main/LICENSE
homepage: https://cyclonedx.org/
repository: https://github.com/CycloneDX/cyclonedx-cli
version: "0.31.0"
tags:
- type/cli
- category/security
- sbom
- cicd
- lang/c
- lang/csharp
- org/cyclonedx
- format/cyclonedx
check: ${binary} --version
platforms:
- linux/amd64
renovate:
  datasource: github-releases
  package: CycloneDX/cyclonedx-cli
  extractVersion: ^v(?<version>.+)$
