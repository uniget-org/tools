# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: ketch
description: Application delivery framework that facilitates the deployment and management of applications on Kubernetes using a simple command line interface
license:
  name: Apache License 2.0
  link: https://github.com/theketchio/ketch/blob/main/LICENSE
homepage: https://github.com/theketchio/ketch
repository: https://github.com/theketchio/ketch
version: "0.7.0"
tags:
- type/cli
- cicd
- lang/go
- kubernetes
- k8s
- state/stale
check: "" # No version parameter
platforms:
- linux/amd64
renovate:
  datasource: github-releases
  package: theketchio/ketch
  extractVersion: ^v(?<version>.+)$
