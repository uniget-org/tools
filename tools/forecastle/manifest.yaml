# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: forecastle
description: Control panel which dynamically discovers and provides a launchpad to access applications deployed on Kubernetes
license:
  name: Apache License 2.0
  link: https://github.com/stakater/Forecastle/blob/master/LICENSE
homepage: https://stakater.com
repository: https://github.com/stakater/Forecastle
version: "2.0.2"
tags:
- category/kubernetes
- type/cli
- lang/go
- kubernetes
- control-panel
check: ${binary} version
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: github-releases
  package: stakater/Forecastle
  extractVersion: ^v(?<version>.+)$
