# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: choose
description: Human-friendly and fast alternative to cut (and sometimes awk)
license:
  name: GPL-3.0
  link: https://github.com/theryangeary/choose/blob/main/LICENSE
homepage: https://github.com/theryangeary/choose
repository: https://github.com/theryangeary/choose
version: "1.3.7"
tags:
- category/development
- lang/rust
- type/cli
- terminal
check: ${binary} --version | cut -d' ' -f2
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: github-releases
  package: theryangeary/choose
  extractVersion: ^v(?<version>.+)$
