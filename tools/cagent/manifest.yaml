# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: cagent
license:
  name: Apache License 2.0
  link: https://github.com/docker/docker-agent/blob/main/LICENSE
version: "1.55.0"
binary: ${target}/libexec/docker/cli-plugins/docker-agent
check: ${binary} version | grep ^docker-agent | cut -d' ' -f3 | tr -d v
platforms:
- linux/amd64
- linux/arm64
tags:
- org/docker
- category/development
- lang/go
- type/cli
- llm
- ai
homepage: https://github.com/docker/docker-agent
repository: https://github.com/docker/docker-agent
description: Agent Builder and Runtime by Docker Engineering
messages:
  update: |
    Disble telemetry:

      TELEMETRY_ENABLED=false docker agent [...]

    ... or...

      export TELEMETRY_ENABLED=false
      docker agent [...]
renovate:
  datasource: github-releases
  package: docker/docker-agent
  extractVersion: ^v(?<version>.+)$
  priority: low
lifecycle:
  renamed_to: docker-agent