# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: zarf
description: Declarative Continuous Delivery for Air-Gapped Kubernetes
license:
  name: Apache License 2.0
  link: https://github.com/zarf-dev/zarf/blob/main/LICENSE
homepage: https://zarf.dev
repository: https://github.com/zarf-dev/zarf
version: "0.81.1"
tags:
- type/cli
- category/operations
- lang/go
- kubernetes
- k8s
- airgap
- cncf/sandbox
check: ${binary} version | tr -d v
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: github-releases
  package: zarf-dev/zarf
  extractVersion: ^v?(?<version>.+)$
