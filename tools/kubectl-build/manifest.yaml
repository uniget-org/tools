# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: kubectl-build
description: Tool for building container images with your Kubernetes cluster
license:
  name: Apache License 2.0
  link: https://github.com/vmware-archive/buildkit-cli-for-kubectl/blob/main/LICENSE
homepage: https://github.com/vmware-archive/buildkit-cli-for-kubectl
repository: https://github.com/vmware-archive/buildkit-cli-for-kubectl
version: "0.1.6"
tags:
- org/vmware
- container/build
- type/cli
- type/plugin
- state/archived
