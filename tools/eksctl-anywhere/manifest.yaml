# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: eksctl-anywhere
description: Run Amazon EKS on your own infrastructure
license:
  name: Apache License 2.0
  link: https://github.com/aws/eks-anywhere/blob/main/LICENSE
homepage: https://anywhere.eks.amazonaws.com
repository: https://github.com/aws/eks-anywhere
version: "0.25.2"
tags:
- org/amazon
- category/operations
- lang/go
- type/cli
- aws/eks
- kubernetes
- k8s
check: "" # No version without eksctl
runtime_dependencies:
- eksctl
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: github-releases
  package: aws/eks-anywhere
  extractVersion: ^v(?<version>.+)$
