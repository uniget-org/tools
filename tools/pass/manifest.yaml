# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: pass
description: The standard unix password manager
license:
  name: GPLv2
  link: https://git.zx2c4.com/password-store/tree/COPYING
homepage: https://www.passwordstore.org/
repository: https://www.passwordstore.org/
version: "1.7.4"
tags:
- category/security
- lang/shell
- type/cli
- password
- management
- standard/pass
- pgp
check: ${binary} version | tr -s ' ' | grep '= v' | cut -d' ' -f2 | tr -d v
build_dependencies:
- make
platforms:
- linux/amd64
renovate:
  datasource: git-tags
  package: https://git.zx2c4.com/password-store.git
  versioning: loose
messages:
  internals: |
    Requires bash, git and gpg.
