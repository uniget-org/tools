# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
name: grafana-agent
description: Telemetry agent for the LGTM stack
license:
  name: Apache License 2.0
  link: https://github.com/grafana/agent/blob/main/LICENSE
homepage: https://grafana.com/docs/agent/
repository: https://github.com/grafana/agent
version: "0.44.2"
tags:
- org/grafana
- observability/metrics
- observability/logs
- observability/traces
- o11y
- category/monitoring
- lang/go
- type/daemon
- standard/prometheus
check: ${binary} --version | head -1 | cut -d' ' -f3 | tr -d v
platforms:
- linux/amd64
renovate:
  datasource: github-releases
  package: grafana/agent
  extractVersion: ^v(?<version>.+)$
messages:
  usage: |
    Grafana Agent has been deprecated in favor of Grafana Alloy.
lifecycle:
  removed_with_reason: End-of-life. Consider using OpenTelemetry Collector or Grafana Alloy.
