# yaml-language-server: $schema=https://tools.uniget.dev/schema.yaml
$schema: https://tools.uniget.dev/schema.yaml
name: glances
description: Cross-platform monitoring tool written in Python
license:
  name: GNU LGPL v3.0
  link: https://github.com/nicolargo/glances/blob/develop/COPYING
homepage: https://github.com/nicolargo/glances
repository: https://github.com/nicolargo/glances
version: "4.5.5"
tags:
- category/operations
- lang/python
- type/tui
- terminal
- component/cpu
- component/memory
check: ${binary} --version | grep -oE '[0-9]+(\.[0-9]+)+' | head -n1
platforms:
- linux/amd64
- linux/arm64
renovate:
  datasource: pip
  package: glances