name: Rebuild tool

on:
  workflow_dispatch:
    inputs:
      tool:
        description: 'Space separated list of tools to rebuild'
        required: true

jobs:

  prepare:
    runs-on: ubuntu-24.04
    if: ${{ inputs.tool != '[]' && inputs.tool != '' }}
    outputs:
      tools: ${{ steps.prepare.outputs.tools }}
    steps:

    - name: Prepare tools
      id: prepare
      env:
        REBUILD_TOOLS: ${{ inputs.tool }}
      run: |
        echo "### Tools to rebuild: ${REBUILD_TOOLS}."
        REBUILD_TOOLS_JSON="$(
            echo -n "${REBUILD_TOOLS}" \
            | tr ' ' '\n' \
            | jq --raw-input '.' | jq --slurp --compact-output '.'
        )"
        echo "    JSON: ${REBUILD_TOOLS_JSON}"
        echo "tools=${REBUILD_TOOLS_JSON}" >>"${GITHUB_OUTPUT}"

  rebuild:
    runs-on: ubuntu-24.04
    needs:
    - prepare
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        tool: ${{ fromJSON(needs.prepare.outputs.tools) }}
    steps:

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install uniget
      uses: uniget-org/uniget-action@2139e70435b6bd47834b7be785d7cb90bf18be6b # v1.0.5
      with:
        prefix: helper
        tools: jq regclient

    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # 4.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # 4.0.0

    - name: Login to GitHub Container Registry
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
      with:
        registry: ghcr.io
        username: uniget-bot
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Rebuild
      run: |
        set -o errexit
        make ${{ matrix.tool }}--push ${{ matrix.tool }}--promote

    - name: Store logs
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: ${{ matrix.tool }}-build.log.zip
        path: "**/build.log"
