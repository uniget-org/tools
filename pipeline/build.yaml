spec:
  inputs:
    name:
      description: Name of the tools to build
      type: string
    os:
      description: Operating systems to build
      type: array
      default:
      - linux
    arch:
      description: Architectures to build
      type: array
      default:
      - amd64

---

.docker_login:
  before_script: |
    echo "${CI_REGISTRY_PASSWORD}" \
    | docker login "${CI_REGISTRY}" \
        --username="${CI_REGISTRY_USER}" \
        --password-stdin

.docker_logout:
  after_script: |
    docker logout "${CI_REGISTRY}"

.dind:
  variables:
    DOCKER_CERT_DIR: ""
  services:
  - name: docker:29.5.3-dind@sha256:ad68e89b675740867a3bb96488a93fea9209ad36c6305bfba2664912d6dcf11a

build_single:
  parallel:
    matrix:
    - os: $[[ inputs.os ]]
      arch: $[[ inputs.arch ]]
  extends:
  - .docker_login
  - .dind
  - .docker_logout
  image: docker:29.5.3@sha256:7278248384185bcbb54c7a76b2f0a7d354c4aac920605cc1ab48968d961052fb
  script:
  - |
    apk update
    apk add \
        bash \
        make \
        curl
  - |
    curl -sLf https://gitlab.com/uniget-org/cli/-/releases/permalink/latest/downloads/uniget_Linux_$(uname -m).tar.gz \
    | tar -xzC "/usr/local/bin" uniget
  - |
    uniget install \
        jq \
        yq
  - |
    make $[[ inputs.name ]]--build-${arch} \
        REGISTRY=${CI_REGISTRY} \
        REPOSITORY_PREFIX=${CI_PROJECT_PATH}/
  artifacts:
    paths:
    - tools/*/build-*.log
    - tools/*/image-*.json
    expire_in: 4 days
  tags:
  - saas-${os}-medium-${arch}

create_index_regctl:
  extends:
  - .docker_login
  - .docker_logout
  needs:
  - job: build_single
    parallel:
      matrix:
      - os: $[[ inputs.os ]]
        arch: $[[ inputs.arch ]]
  image: docker:29.5.3@sha256:7278248384185bcbb54c7a76b2f0a7d354c4aac920605cc1ab48968d961052fb
  script:
  - |
    apk add --update-cache \
        bash \
        make \
        curl
  - |
    curl -sLf https://gitlab.com/uniget-org/cli/-/releases/permalink/latest/downloads/uniget_Linux_$(uname -m).tar.gz \
    | tar -xzC "/usr/local/bin" uniget
  - |
    uniget install \
        jq \
        yq \
        regclient
  - |
    echo "### Creating index ${CI_REGISTRY_IMAGE}/$[[ inputs.name ]]"
    make $[[ inputs.name ]]--index \
        REGISTRY=${CI_REGISTRY} \
        REPOSITORY_PREFIX=${CI_PROJECT_PATH}/
    INDEX_DIGEST="$( cat tools/$[[ inputs.name ]]/index.json | sha256sum | cut -d' ' -f1 )"
    echo "Got index digest: ${INDEX_DIGEST}"
    echo "INDEX_DIGEST=${INDEX_DIGEST}" >index.env
  artifacts:
    paths:
    - tools/*/index.json
    expire_in: 4 days
    reports:
      dotenv: index.env
  
.sign:
  extends:
  - .docker_login
  - .docker_logout
  needs:
  - create_index_regctl
  image: docker:29.5.3@sha256:7278248384185bcbb54c7a76b2f0a7d354c4aac920605cc1ab48968d961052fb
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  variables:
    COSIGN_EXPERIMENTAL: 1
  script:
  - |
    apk add --update-cache \
        bash \
        curl \
        make
  - |
    curl -sLf https://gitlab.com/uniget-org/cli/-/releases/permalink/latest/downloads/uniget_Linux_$(uname -m).tar.gz \
    | tar -xzC "/usr/local/bin" uniget
  - |
    uniget install \
        jq \
        yq \
        regclient \
        cosign
  - |
    echo "Got index digest: ${INDEX_DIGEST}"
  - |
    echo "### Sign ${IMAGE}"
    make $[[ inputs.name ]]--sign \
        REGISTRY=${CI_REGISTRY} \
        REPOSITORY_PREFIX=${CI_PROJECT_PATH}/
  artifacts:
    paths:
    - tools/*/cosign*
    expire_in: 4 days
  tags:
  - saas-linux-medium-amd64
